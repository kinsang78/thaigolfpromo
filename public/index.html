<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>동남아 골프프로모션</title>
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #F6F5F0;
    --card: #FFFFFF;
    --text: #1A1A1A;
    --text2: #6B6B6B;
    --text3: #9B9B9B;
    --border: #E8E6E1;
    --green: #1D9E75;
    --green-bg: #E1F5EE;
    --amber: #BA7517;
    --amber-bg: #FFF8ED;
    --purple: #6A4FC7;
    --purple-bg: #F0EDFF;
    --red: #D64545;
    --red-bg: #FFF0F0;
    --accent: #1B5E20;
  }

  body {
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .app {
    max-width: 480px;
    margin: 0 auto;
    padding: 0 16px 80px;
  }

  /* ===== HEADER ===== */
  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg);
    padding: 16px 0 12px;
  }

  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }

  .logo {
    font-size: 18px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: -0.5px;
  }

  .logo span { font-weight: 400; color: var(--text2); }

  .count-badge {
    font-size: 12px;
    color: var(--text2);
    background: var(--card);
    border: 1px solid var(--border);
    padding: 4px 10px;
    border-radius: 20px;
  }

  /* ===== COUNTRY TABS (신규) ===== */
  .country-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }

  .country-btn {
    flex: 1;
    text-align: center;
    padding: 10px;
    border-radius: 12px;
    background: var(--card);
    border: 1px solid var(--border);
    font-weight: 600;
    font-size: 14px;
    color: var(--text3);
    cursor: pointer;
    transition: all 0.2s;
  }

  .country-btn.active {
    background: var(--text);
    color: #fff;
    border-color: var(--text);
  }

  /* ===== REGION FILTERS ===== */
  .filter-scroll {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    scrollbar-width: none;
    -ms-overflow-style: none;
    padding-bottom: 2px;
  }
  .filter-scroll::-webkit-scrollbar { display: none; }

  .filter-btn {
    flex-shrink: 0;
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    padding: 7px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text2);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .filter-btn.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  /* ===== SORT ===== */
  .sort-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: 14px 0 10px;
  }

  .sort-bar span { font-size: 12px; color: var(--text3); }

  .sort-select {
    font-family: inherit;
    font-size: 12px;
    color: var(--text2);
    background: transparent;
    border: none;
    cursor: pointer;
    text-align: right;
  }

  /* ===== CARDS ===== */
  .card {
    background: var(--card);
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 10px;
    border: 1px solid var(--border);
    transition: transform 0.1s;
  }

  .card:active { transform: scale(0.985); }

  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
    margin-bottom: 10px;
  }

  .course-name {
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.3px;
    line-height: 1.3;
  }

  .course-sub {
    font-size: 12px;
    color: var(--text3);
    margin-top: 2px;
  }

  .type-badge {
    flex-shrink: 0;
    font-size: 11px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 8px;
    white-space: nowrap;
  }

  .type-all { background: var(--green-bg); color: var(--green); }
  .type-green { background: var(--amber-bg); color: var(--amber); }
  .type-pkg { background: var(--purple-bg); color: var(--purple); }

  .price-row {
    display: flex;
    align-items: baseline;
    gap: 6px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }

  .price-main {
    font-size: 22px;
    font-weight: 800;
    color: var(--text);
    letter-spacing: -0.5px;
  }

  .price-unit {
    font-size: 13px;
    font-weight: 500;
    color: var(--text2);
  }

  .price-sep {
    font-size: 13px;
    color: var(--text3);
  }

  .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-bottom: 8px;
  }

  .tag {
    font-size: 11px;
    font-weight: 500;
    padding: 3px 8px;
    border-radius: 6px;
    background: #F2F1EC;
    color: var(--text2);
  }

  .tag-included { background: var(--green-bg); color: var(--green); }
  .tag-extra { background: var(--red-bg); color: var(--red); }

  .cond-text {
    font-size: 12px;
    color: var(--text2);
    line-height: 1.6;
    margin-bottom: 8px;
    padding: 8px 10px;
    background: #FAFAF7;
    border-radius: 8px;
  }

  .card-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 8px;
    border-top: 1px solid var(--border);
  }

  .date-text { font-size: 12px; color: var(--text3); }

  .contact-link {
    font-size: 12px;
    font-weight: 600;
    color: var(--accent);
    text-decoration: none;
  }

  /* ===== EMPTY & LOADING & SKELETON ===== */
  .empty { text-align: center; padding: 60px 20px; color: var(--text3); }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty-title { font-size: 16px; font-weight: 600; color: var(--text2); margin-bottom: 6px; }
  .empty-desc { font-size: 13px; line-height: 1.6; }

  .skeleton-card { background: var(--card); border-radius: 14px; padding: 16px; margin-bottom: 10px; border: 1px solid var(--border); }
  .sk-line { height: 14px; background: linear-gradient(90deg, #f0efe9 25%, #e8e7e1 50%, #f0efe9 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 6px; margin-bottom: 10px; }
  .sk-line:nth-child(1) { width: 55%; height: 18px; }
  .sk-line:nth-child(2) { width: 35%; }
  .sk-line:nth-child(3) { width: 40%; height: 24px; }
  .sk-line:nth-child(4) { width: 80%; }
  .sk-line:last-child { margin-bottom: 0; }
  @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }

  .refresh-btn {
    position: fixed; bottom: 20px; right: 20px; width: 48px; height: 48px; border-radius: 50%;
    background: var(--accent); color: #fff; border: none; font-size: 20px; cursor: pointer;
    box-shadow: 0 4px 12px rgba(27, 94, 32, 0.3); display: flex; align-items: center; justify-content: center;
    transition: transform 0.15s; z-index: 100;
  }
  .refresh-btn:active { transform: scale(0.9); }
  .refresh-btn svg { width: 22px; height: 22px; fill: #fff; }
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <div class="header-top">
      <div class="logo">글로벌골프 <span>프로모션</span></div>
      <div class="count-badge" id="countBadge">불러오는 중...</div>
    </div>
    
    <div class="country-tabs">
      <button class="country-btn active" data-country="태국" onclick="setCountry('태국')">🇹🇭 태국</button>
      <button class="country-btn" data-country="인도네시아" onclick="setCountry('인도네시아')">🇮🇩 인도네시아</button>
    </div>

    <div class="filter-scroll" id="filters"></div>
  </div>

  <div class="sort-bar">
    <span id="statusText">진행 중인 프로모션</span>
    <select class="sort-select" id="sortSelect" onchange="render()">
      <option value="newest">최신 등록순</option>
      <option value="price_low">가격 낮은순</option>
      <option value="price_high">가격 높은순</option>
      <option value="ending">마감 임박순</option>
    </select>
  </div>

  <div id="content">
    <div class="skeleton-card"><div class="sk-line"></div><div class="sk-line"></div><div class="sk-line"></div><div class="sk-line"></div></div>
    <div class="skeleton-card"><div class="sk-line"></div><div class="sk-line"></div><div class="sk-line"></div><div class="sk-line"></div></div>
  </div>
</div>

<button class="refresh-btn" onclick="loadData()" title="새로고침">
  <svg viewBox="0 0 24 24"><path d="M17.65 6.35A7.958 7.958 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
</button>

<script>
// ============================================================
// Supabase 설정
// ============================================================
const SUPABASE_URL = "https://lkdhclaoxqgrlrjmsglm.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxrZGhjbGFveHFncmxyam1zZ2xtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0NzE5MDMsImV4cCI6MjA5MTA0NzkwM30.rKsKu_LvYT1QP2QUilrvBT2AwU0TzwK9Aknk6eXEcoE";

let allData = [];
let activeCountry = "태국"; // 기본 국가 설정
let activeRegion = "전체";

// 태국/인도네시아(방콕) 타임존 기준 오늘 자정 시간 구하기 (종료일 계산용)
function getBangkokMidnight() {
  const bkkStr = new Date().toLocaleString("en-US", { timeZone: "Asia/Bangkok" });
  const bkkDate = new Date(bkkStr);
  bkkDate.setHours(0, 0, 0, 0);
  return bkkDate;
}

// 데이터 불러오기
async function loadData() {
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/promotions?status=eq.active&order=created_at.desc`,
      { headers: { "apikey": SUPABASE_ANON_KEY, "Authorization": `Bearer ${SUPABASE_ANON_KEY}` } }
    );
    if (!res.ok) throw new Error("DB 연결 실패");

    allData = await res.json();
    buildFilters();
    render();
  } catch (err) {
    console.error(err);
    document.getElementById("content").innerHTML = `<div class="empty"><div class="empty-icon">&#x26A0;&#xFE0F;</div><div class="empty-title">연결 오류</div></div>`;
  }
}

// 국가 선택 액션
function setCountry(country) {
  activeCountry = country;
  activeRegion = "전체"; // 국가 변경 시 지역 필터 초기화
  
  // 버튼 스타일 변경
  document.querySelectorAll('.country-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.country === country);
  });
  
  buildFilters();
  render();
}

// 지역 필터 생성 (선택된 국가에 속한 지역만 추출)
function buildFilters() {
  // DB에 country 값이 비어있는 과거 데이터는 '태국'으로 간주
  const countryData = allData.filter(d => (d.country || '태국') === activeCountry);
  const regions = ["전체", ...new Set(countryData.map(d => d.region).filter(Boolean))];
  
  const el = document.getElementById("filters");
  el.innerHTML = "";
  regions.forEach(r => {
    const b = document.createElement("button");
    b.className = "filter-btn" + (r === activeRegion ? " active" : "");
    b.textContent = r;
    b.onclick = () => {
      activeRegion = r;
      el.querySelectorAll(".filter-btn").forEach(x => x.classList.remove("active"));
      b.classList.add("active");
      render();
    };
    el.appendChild(b);
  });
}

function getMinPrice(d) {
  const vals = Object.values(d.green_fee || {});
  if (!vals.length) return Infinity;
  return Math.min(...vals.map(Number));
}

// D-Day 계산 (타임존 적용)
function getDaysLeft(d) {
  if (!d.end_date) return Infinity;
  const endDate = new Date(d.end_date + "T00:00:00");
  const today = getBangkokMidnight();
  const diff = (endDate - today) / (1000 * 60 * 60 * 24);
  return Math.ceil(diff);
}

function render() {
  // 1. 국가 필터 적용
  let items = allData.filter(d => (d.country || '태국') === activeCountry);

  // 2. 지역 필터 적용
  if (activeRegion !== "전체") {
    items = items.filter(d => d.region === activeRegion);
  }

  // 3. 정렬 적용
  const sort = document.getElementById("sortSelect").value;
  if (sort === "price_low") items.sort((a, b) => getMinPrice(a) - getMinPrice(b));
  else if (sort === "price_high") items.sort((a, b) => getMinPrice(b) - getMinPrice(a));
  else if (sort === "ending") items.sort((a, b) => getDaysLeft(a) - getDaysLeft(b));

  document.getElementById("countBadge").textContent = `${items.length}개 프로모션`;

  if (items.length === 0) {
    document.getElementById("content").innerHTML = `
      <div class="empty">
        <div class="empty-icon">&#x1F3CC;&#xFE0F;</div>
        <div class="empty-title">프로모션이 없습니다</div>
        <div class="empty-desc">해당 조건에 맞는 프로모션이 아직 없습니다.</div>
      </div>`;
    return;
  }

  document.getElementById("content").innerHTML = items.map(renderCard).join("");
}

function renderCard(d) {
  const badgeClass = d.price_type === "all_inclusive" ? "type-all" : d.price_type === "package" ? "type-pkg" : "type-green";
  const badgeText = d.price_type === "all_inclusive" ? "올인클루시브" : d.price_type === "package" ? "패키지" : "그린피만";

  // 화폐 단위 설정 (루피아 추가)
  let curr = "바트";
  if (d.currency === "KRW") curr = "원";
  if (d.currency === "IDR") curr = "루피아";

  const labelMap = { default: "", weekday: "주중", weekend: "주말", morning: "오전", afternoon: "오후", golfer: "골퍼", non_golfer: "논골퍼", wednesday: "수요일", weekend_afternoon: "주말오후" };

  const entries = Object.entries(d.green_fee || {});
  let priceHTML = "";
  if (entries.length === 1) {
    const [k, v] = entries[0];
    const label = labelMap[k] || k;
    priceHTML = `<span class="price-main">${Number(v).toLocaleString()}</span> <span class="price-unit">${curr}${label ? " (" + label + ")" : ""}</span>`;
  } else if (entries.length > 0) {
    priceHTML = entries.map(([k, v], i) => {
      const label = labelMap[k] || k;
      return `${i > 0 ? '<span class="price-sep"> / </span>' : ""}<span class="price-main" style="font-size:${entries.length > 2 ? 17 : 20}px">${Number(v).toLocaleString()}</span><span class="price-unit">${curr}${label ? "(" + label + ")" : ""}</span>`;
    }).join("");
  } else {
    priceHTML = `<span class="price-main">가격 미정</span>`;
  }

  const tags = [];
  if (d.includes_caddy) tags.push('<span class="tag tag-included">캐디 포함</span>');
  if (d.includes_cart) tags.push('<span class="tag tag-included">카트 포함</span>');
  if (d.includes_hotel) tags.push('<span class="tag tag-included">숙박 포함</span>');
  if (d.includes_meal) tags.push('<span class="tag tag-included">식사 포함</span>');
  
  // 루피아 단위는 화폐가 크므로 단위 표시 통일
  const extraCurr = d.currency === "IDR" ? "루피아" : (d.currency === "KRW" ? "원" : "바트");
  if (d.caddy_fee) tags.push(`<span class="tag tag-extra">캐디 ${Number(d.caddy_fee).toLocaleString()}${extraCurr} 별도</span>`);
  if (d.cart_fee) tags.push(`<span class="tag tag-extra">카트 ${Number(d.cart_fee).toLocaleString()}${extraCurr} 별도</span>`);

  const startStr = d.start_date ? formatDate(d.start_date) : "미정";
  const endStr = d.end_date ? formatDate(d.end_date) : "상시";
  const daysLeft = getDaysLeft(d);
  
  let daysTag = "";
  if (daysLeft < 0) daysTag = ' <span style="color:var(--red);font-weight:600;">종료됨</span>';
  else if (daysLeft === 0) daysTag = ' <span style="color:var(--red);font-weight:600;">오늘 종료</span>';
  else if (daysLeft <= 7) daysTag = ` <span style="color:var(--amber);font-weight:600;">마감 ${daysLeft}일 전</span>`;

  let contactHTML = "";
  if (d.contact_kakao) contactHTML = `<span class="contact-link">카톡 ${d.contact_kakao}</span>`;
  else if (d.contact_phone) contactHTML = `<a href="tel:${d.contact_phone.replace(/[^0-9+]/g, "")}" class="contact-link">${d.contact_phone}</a>`;

  return `<div class="card">
    <div class="card-header">
      <div>
        <div class="course-name">${escHtml(d.golf_course)}</div>
        <div class="course-sub">[${d.country || '태국'}] ${escHtml(d.golf_course_en || "")}${d.golf_course_en && d.region ? " · " : ""}${escHtml(d.region || "")}</div>
      </div>
      <span class="type-badge ${badgeClass}">${badgeText}</span>
    </div>
    <div class="price-row">${priceHTML}</div>
    ${tags.length ? `<div class="tags">${tags.join("")}</div>` : ""}
    ${d.conditions ? `<div class="cond-text">${escHtml(d.conditions)}</div>` : ""}
    <div class="card-footer">
      <span class="date-text">${startStr} ~ ${endStr}${daysTag}</span>
      ${contactHTML}
    </div>
  </div>`;
}

function formatDate(s) {
  const d = new Date(s + "T00:00:00");
  return `${d.getMonth() + 1}/${d.getDate()}`;
}

function escHtml(s) {
  if (!s) return "";
  return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

loadData();
</script>

</body>
</html>
