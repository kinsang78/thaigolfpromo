<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>타이골프 프로모션</title>
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  :root{
    --bg:#F6F5F0;--card:#FFFFFF;--text:#1A1A1A;--text2:#6B6B6B;--text3:#9B9B9B;
    --border:#E8E6E1;--green:#1D9E75;--green-bg:#E1F5EE;--amber:#BA7517;--amber-bg:#FFF8ED;
    --purple:#6A4FC7;--purple-bg:#F0EDFF;--red:#D64545;--red-bg:#FFF0F0;--accent:#1B5E20;
    --blue:#2563EB;--blue-bg:#EFF6FF;--orange:#D97706;--orange-bg:#FFF7ED;
    --promo-border:#C8E6C9;--promo-bg:#FAFFF9;
  }
  body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
  .app{max-width:480px;margin:0 auto;padding:0 16px 80px}
  .header{position:sticky;top:0;z-index:100;background:var(--bg);padding:12px 0 0}
  .header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  .logo{font-size:17px;font-weight:700;color:var(--accent);letter-spacing:-0.5px}
  .logo span{font-weight:400;color:var(--text2)}
  .count-badge{font-size:12px;color:var(--text2);background:var(--card);border:1px solid var(--border);padding:4px 10px;border-radius:20px}
  .search-wrap{position:relative;margin-bottom:8px}
  .search-input{width:100%;font-family:inherit;font-size:14px;padding:8px 14px 8px 36px;border:1px solid var(--border);border-radius:10px;background:var(--card);color:var(--text);outline:none;transition:border-color 0.15s}
  .search-input:focus{border-color:var(--accent)}
  .search-input::placeholder{color:var(--text3)}
  .search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:18px;height:18px;color:var(--text3)}
  .control-bar{display:flex;align-items:center;gap:8px;padding:0 0 10px;flex-wrap:wrap}
  .region-select, .sort-select{font-family:inherit;font-size:13px;font-weight:500;padding:7px 10px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--text);cursor:pointer;outline:none}
  .region-select{max-width:130px}
  .control-spacer{flex:1}

  /* 카드 공통 스타일 */
  .card{background:var(--card);border-radius:14px;margin-bottom:12px;border:1px solid var(--border);overflow:hidden;display:flex;flex-direction:column}
  .card.has-promo{border-color:var(--promo-border);background:var(--promo-bg)}
  .card-main{padding:14px 16px 10px}
  .course-name{font-size:16px;font-weight:700;color:var(--text);letter-spacing:-0.3px;line-height:1.3}
  .course-name .promo-icon{margin-right:4px}
  .course-sub{font-size:12px;color:var(--text3);margin-top:3px}

  /* 일반가 섹션 */
  .normal-price-section{padding:8px 16px 10px;font-size:13px;color:var(--text2)}
  .normal-price-row{display:flex;align-items:baseline;gap:4px;flex-wrap:wrap;font-weight:700;color:var(--text)}
  .normal-price-unit{font-size:12px;font-weight:500;color:var(--text2)}
  .normal-price-note{font-size:11px;color:var(--text3);margin-top:4px}

  /* [수정] 액션 버튼 영역 - 우측 정렬 통일 */
  .card-actions-row {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    padding: 0 16px 14px;
    margin-top: auto;
  }
  .action-btn{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;text-decoration:none;padding:7px 12px;border-radius:8px;white-space:nowrap;transition:all 0.1s}
  .btn-primary{background:var(--accent);color:#fff;border:1px solid var(--accent)}
  .btn-outline{background:#fff;color:var(--accent);border:1px solid var(--accent)}
  .btn-disabled{background:#F2F1EC;color:var(--text3);border:1px solid var(--border);cursor:not-allowed}
  .action-btn .icon{width:14px;height:14px}

  /* 프로모션 리스트 */
  .promo-item{padding:12px 16px;border-top:1px solid var(--border)}
  .card.has-promo .promo-item{border-top-color:var(--promo-border)}
  .promo-status-row{display:flex;gap:4px;margin-bottom:8px}
  .status-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px}
  .status-active{background:var(--green-bg);color:var(--green)}
  .status-ending{background:var(--red-bg);color:var(--red)}
  .type-tournament{background:var(--orange-bg);color:var(--orange)}

  .price-row{display:flex;align-items:baseline;gap:6px;margin-bottom:6px}
  .price-main{font-size:20px;font-weight:800;color:var(--text)}
  .price-unit{font-size:13px;font-weight:500;color:var(--text2)}
  .price-extras{font-size:11px;color:var(--text2);background:#F0F8F0;padding:6px 10px;border-radius:8px;margin-bottom:8px}

  /* 토글 스위치 */
  .toggle-switch{position:relative;width:34px;height:20px;background:var(--border);border-radius:10px;cursor:pointer;transition:0.2s}
  .toggle-switch.on{background:var(--orange)}
  .toggle-switch::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;background:#fff;border-radius:50%;transition:0.2s}
  .toggle-switch.on::after{transform:translateX(14px)}
  .toggle-label{font-size:11px;font-weight:600;color:var(--text2)}

  .footer{text-align:center;padding:40px 16px 20px;font-size:11px;color:var(--text3)}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-top">
      <div class="logo">타이골프 <span>프로모션</span></div>
      <div id="countBadge" class="count-badge">로딩 중...</div>
    </div>
    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" class="search-input" id="searchInput" placeholder="골프장 이름으로 검색" oninput="render()">
    </div>
    <div class="control-bar">
      <select class="region-select" id="regionSelect" onchange="setRegion(this.value)">
        <option value="전체">전체 지역</option>
      </select>
      <select class="sort-select" id="sortSelect" onchange="render()">
        <option value="recommended">추천순</option>
        <option value="nearby">가까운 순</option>
        <option value="price_low">가격 낮은순</option>
        <option value="ending">마감 임박순</option>
      </select>
      <div class="control-spacer"></div>
      <div class="toggle-switch" id="tournamentToggle" onclick="toggleTournamentFilter()"></div>
      <span class="toggle-label">대회 전용</span>
    </div>
  </div>

  <div id="content"></div>

  <div class="footer">
    가격 정보는 참고용이며 예약 전 반드시 재확인 바랍니다.<br>
    © 2026 Kinsang Lab.
  </div>
</div>

<script>
var SUPABASE_URL="https://lkdhclaoxqgrlrjmsglm.supabase.co";
var SUPABASE_ANON_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxrZGhjbGFveHFncmxyam1zZ2xtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0NzE5MDMsImV4cCI6MjA5MTA0NzkwM30.rKsKu_LvYT1QP2QUilrvBT2AwU0TzwK9Aknk6eXEcoE";
var GOLFDIGG_BASE="https://golfdigg.com";

var allCourses=[], allPromotions=[], mergedData=[];
var activeRegion="전체", tournamentOnly=false, userLat=null, userLng=null;

// 이름 정제 함수 (TH 제거)
function cleanName(name) {
  if(!name) return "";
  return name.replace(/^TH\s*/i, '').trim();
}

async function loadData(){
  try{
    const headers = {"apikey":SUPABASE_ANON_KEY,"Authorization":"Bearer "+SUPABASE_ANON_KEY};
    const [r1, r2] = await Promise.all([
      fetch(SUPABASE_URL+"/rest/v1/golf_courses?country=eq.%ED%83%9C%EA%B5%AD&order=name_en.asc&limit=500", {headers}),
      fetch(SUPABASE_URL+"/rest/v1/promotions?status=eq.active&order=created_at.desc", {headers})
    ]);
    allCourses = await r1.json();
    allPromotions = await r2.json();

    mergeData();
    buildRegionFilters();
    render();
  }catch(e){ console.error(e); }
}

function mergeData(){
  const courseMap = {};
  allCourses.forEach(c => {
    courseMap[c.id] = {
      course: c, 
      promos: [],
      displayName: cleanName(c.name_ko || c.name_en),
      displayNameEn: cleanName(c.name_en),
      region: c.region, lat: c.latitude, lng: c.longitude
    };
  });

  allPromotions.forEach(p => {
    if(p.golf_course_id && courseMap[p.golf_course_id]){
      courseMap[p.golf_course_id].promos.push(p);
    }
  });
  mergedData = Object.values(courseMap);
}

function toggleTournamentFilter(){
  tournamentOnly = !tournamentOnly;
  document.getElementById("tournamentToggle").classList.toggle("on", tournamentOnly);
  render();
}

function calcDist(la1, ln1, la2, ln2){
  if(!la1 || !la2) return Infinity;
  const R=6371, dLa=(la2-la1)*Math.PI/180, dLn=(ln2-ln1)*Math.PI/180;
  const a=Math.sin(dLa/2)**2 + Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLn/2)**2;
  return R*2*Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function getMinPrice(d){
  let p = d.course ? Math.min(...[d.course.normal_weekday_am, d.course.normal_weekend_am].filter(v=>v)) : Infinity;
  d.promos.forEach(pr => {
    if(pr.green_fee) {
      const vals = Object.values(pr.green_fee).map(Number).filter(v=>!isNaN(v));
      if(vals.length) p = Math.min(p, ...vals);
    }
  });
  return p === Infinity ? 999999 : p;
}

function render(){
  const q = document.getElementById("searchInput").value.toLowerCase();
  let items = mergedData.filter(d => {
    if(activeRegion!=="전체" && d.region!==activeRegion) return false;
    if(tournamentOnly && !d.promos.some(p => (p.conditions||"").includes("[대회]"))) return false;
    if(q && !d.displayName.toLowerCase().includes(q) && !d.displayNameEn.toLowerCase().includes(q)) return false;
    return true;
  });

  const sort = document.getElementById("sortSelect").value;
  items.sort((a,b) => {
    if(sort==="price_low") return getMinPrice(a) - getMinPrice(b);
    if(sort==="nearby" && userLat) return calcDist(userLat,userLng,a.lat,a.lng) - calcDist(userLat,userLng,b.lat,b.lng);
    if(sort==="ending") {
      const getEnd = d => d.promos.length ? Math.min(...d.promos.map(p=>p.end_date?new Date(p.end_date):Infinity)) : Infinity;
      return getEnd(a) - getEnd(b);
    }
    return a.displayName.localeCompare(b.displayName);
  });

  document.getElementById("countBadge").textContent = items.length + "개 골프장";
  document.getElementById("content").innerHTML = items.map(d => renderCard(d)).join("");
}

function renderCard(d){
  const hasP = d.promos.length > 0;
  let html = `<div class="card ${hasP?'has-promo':''}">
    <div class="card-main">
      <div class="course-name">${hasP?'<span class="promo-icon">🏷️</span>':''}${d.displayName}</div>
      <div class="course-sub">${d.region || '지역 정보 없음'} ${userLat && d.lat ? ' · '+Math.round(calcDist(userLat,userLng,d.lat,d.lng))+'km' : ''}</div>
    </div>`;

  if(hasP){
    const p = d.promos[0];
    const isT = (p.conditions||"").includes("[대회]");
    html += `<div class="promo-item">
      <div class="promo-status-row">
        <span class="status-badge status-active">프로모션 진행중</span>
        ${isT?'<span class="status-badge type-tournament">대회</span>':''}
      </div>
      <div class="price-row">
        <span class="price-main">${getMinPrice(d).toLocaleString()}</span><span class="price-unit"> 바트~</span>
      </div>
      <div class="price-extras">${p.conditions || '상세 조건은 예약 시 확인'}</div>
    </div>`;
  } else {
    const price = d.course ? d.course.normal_weekday_am : null;
    html += `<div class="normal-price-section">
      <div class="normal-price-row">${price ? price.toLocaleString() + ' <span class="normal-price-unit">바트 (주중 일반가)</span>' : '가격 정보 없음'}</div>
    </div>`;
  }

  // 액션 버튼 영역 (우측 정렬 통일)
  html += `<div class="card-actions-row">`;
  const phone = (hasP && d.promos[0].contact_phone) || (d.course && d.course.phone);
  if(phone) html += `<a href="tel:${phone}" class="action-btn btn-primary">전화예약</a>`;
  
  if(d.course && d.course.is_valid_on_golfdigg === false) {
    html += `<span class="action-btn btn-disabled">부킹 미지원</span>`;
  } else if(d.course && d.course.golfdigg_slug) {
    html += `<a href="${GOLFDIGG_BASE}/en/courses/${d.course.golfdigg_slug}" target="_blank" class="action-btn btn-outline">Golfdigg</a>`;
  }
  html += `</div></div>`;
  return html;
}

function buildRegionFilters(){
  const regs = [...new Set(mergedData.map(d=>d.region).filter(v=>v))].sort();
  const el = document.getElementById("regionSelect");
  regs.forEach(r => el.add(new Option(r, r)));
}

function setRegion(v){ activeRegion=v; render(); }

// 위치 정보 획득
if(navigator.geolocation) {
  navigator.geolocation.getCurrentPosition(p => {
    userLat=p.coords.latitude; userLng=p.coords.longitude;
    render();
  }, null, {timeout: 5000});
}

loadData();
</script>
</body>
</html>
