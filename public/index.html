<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>글로벌골프 프로모션</title>
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  :root{
    --bg:#F6F5F0;--card:#FFFFFF;--text:#1A1A1A;--text2:#6B6B6B;--text3:#9B9B9B;
    --border:#E8E6E1;--green:#1D9E75;--green-bg:#E1F5EE;--amber:#BA7517;--amber-bg:#FFF8ED;
    --purple:#6A4FC7;--purple-bg:#F0EDFF;--red:#D64545;--red-bg:#FFF0F0;--accent:#1B5E20;
    --blue:#2563EB;--blue-bg:#EFF6FF;--orange:#D97706;--orange-bg:#FFF7ED;
  }
  body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
  .app{max-width:480px;margin:0 auto;padding:0 16px 80px}
  .header{position:sticky;top:0;z-index:100;background:var(--bg);padding:16px 0 0}
  .header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
  .logo{font-size:18px;font-weight:700;color:var(--accent);letter-spacing:-0.5px}
  .logo span{font-weight:400;color:var(--text2)}
  .count-badge{font-size:12px;color:var(--text2);background:var(--card);border:1px solid var(--border);padding:4px 10px;border-radius:20px}
  .search-wrap{position:relative;margin-bottom:10px}
  .search-input{width:100%;font-family:inherit;font-size:14px;padding:10px 14px 10px 38px;border:1px solid var(--border);border-radius:12px;background:var(--card);color:var(--text);outline:none;transition:border-color 0.15s}
  .search-input:focus{border-color:var(--accent)}
  .search-input::placeholder{color:var(--text3)}
  .search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:18px;height:18px;color:var(--text3)}
  .country-tabs{display:flex;gap:8px;margin-bottom:10px}
  .country-tab{flex:1;font-family:inherit;font-size:14px;font-weight:600;padding:10px;border-radius:12px;border:1px solid var(--border);background:var(--card);color:var(--text2);cursor:pointer;text-align:center;transition:all 0.15s}
  .country-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  .filter-scroll{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none;padding-bottom:10px}
  .filter-scroll::-webkit-scrollbar{display:none}
  .filter-btn{flex-shrink:0;font-family:inherit;font-size:13px;font-weight:500;padding:7px 14px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--text2);cursor:pointer;transition:all 0.15s;white-space:nowrap}
  .filter-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  .sort-bar{display:flex;justify-content:space-between;align-items:center;margin:0 0 10px}
  .sort-bar span{font-size:12px;color:var(--text3)}
  .sort-select{font-family:inherit;font-size:12px;color:var(--text2);background:transparent;border:none;cursor:pointer}

  .card{background:var(--card);border-radius:14px;margin-bottom:10px;border:1px solid var(--border);overflow:hidden}
  .card-main{padding:16px 16px 8px}
  .card-header{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
  .card-header-left{flex:1;min-width:0}
  .course-name{font-size:16px;font-weight:700;color:var(--text);letter-spacing:-0.3px;line-height:1.3}
  .course-name .cc{font-size:12px;font-weight:600;color:var(--text3);margin-right:4px}
  .course-sub{font-size:12px;color:var(--text3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .card-header-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
  .promo-count-label{font-size:11px;color:var(--text3);white-space:nowrap}

  .badge{font-size:11px;font-weight:600;padding:4px 10px;border-radius:8px;white-space:nowrap}
  .type-all{background:var(--green-bg);color:var(--green)}
  .type-green{background:var(--amber-bg);color:var(--amber)}
  .type-pkg{background:var(--purple-bg);color:var(--purple)}
  .type-tournament{background:var(--orange-bg);color:var(--orange)}

  .promo-list{border-top:1px solid var(--border)}
  .promo-item{padding:12px 16px;border-top:1px solid var(--border)}
  .promo-item:first-child{border-top:none}
  .promo-status-row{display:flex;gap:4px;margin-bottom:6px;flex-wrap:wrap}
  .status-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;display:inline-block}
  .status-upcoming{background:var(--blue-bg);color:var(--blue)}
  .status-active{background:var(--green-bg);color:var(--green)}
  .status-ending{background:var(--red-bg);color:var(--red);animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.6}}
  .promo-type-badge{font-size:10px;font-weight:600;padding:3px 8px;border-radius:6px;display:inline-block}

  .price-row{display:flex;align-items:baseline;gap:6px;margin-bottom:6px;flex-wrap:wrap}
  .price-main{font-size:22px;font-weight:800;color:var(--text);letter-spacing:-0.5px}
  .price-unit{font-size:13px;font-weight:500;color:var(--text2)}
  .price-sep{font-size:13px;color:var(--text3)}
  .price-note{font-size:11px;color:var(--text3);margin-bottom:6px;font-style:italic}

  .tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px}
  .tag{font-size:11px;font-weight:500;padding:3px 8px;border-radius:6px;background:#F2F1EC;color:var(--text2)}
  .tag-included{background:var(--green-bg);color:var(--green)}
  .tag-extra{background:var(--red-bg);color:var(--red)}
  .cond-text{font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:6px;padding:6px 10px;background:#FAFAF7;border-radius:8px}
  .promo-footer{display:flex;justify-content:space-between;align-items:center}
  .date-text{font-size:12px;color:var(--text3)}
  .contact-link{font-size:12px;font-weight:600;color:var(--accent);text-decoration:none}

  .expand-btn{width:100%;padding:8px;border:none;border-top:1px solid var(--border);background:#FAFAF7;color:var(--text2);font-family:inherit;font-size:12px;font-weight:500;cursor:pointer;transition:background 0.15s}
  .expand-btn:active{background:#F0EFE9}
  .expand-btn svg{width:14px;height:14px;vertical-align:middle;margin-left:4px;transition:transform 0.2s}
  .expand-btn.open svg{transform:rotate(180deg)}
  .promo-hidden{display:none}
  .promo-hidden.show{display:block}

  .empty{text-align:center;padding:60px 20px;color:var(--text3)}
  .empty-icon{font-size:40px;margin-bottom:12px}
  .empty-title{font-size:16px;font-weight:600;color:var(--text2);margin-bottom:6px}
  .empty-desc{font-size:13px;line-height:1.6}
  .skeleton-card{background:var(--card);border-radius:14px;padding:16px;margin-bottom:10px;border:1px solid var(--border)}
  .sk-line{height:14px;background:linear-gradient(90deg,#f0efe9 25%,#e8e7e1 50%,#f0efe9 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:6px;margin-bottom:10px}
  .sk-line:nth-child(1){width:55%;height:18px}.sk-line:nth-child(2){width:35%}.sk-line:nth-child(3){width:40%;height:24px}.sk-line:last-child{width:80%;margin-bottom:0}
  @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
  .refresh-btn{position:fixed;bottom:20px;right:20px;width:48px;height:48px;border-radius:50%;background:var(--accent);color:#fff;border:none;cursor:pointer;box-shadow:0 4px 12px rgba(27,94,32,0.3);display:flex;align-items:center;justify-content:center;transition:transform 0.15s;z-index:100}
  .refresh-btn:active{transform:scale(0.9)}
  .refresh-btn svg{width:22px;height:22px;fill:#fff}
  mark{background:#FEF08A;color:var(--text);border-radius:2px;padding:0 1px}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-top">
      <div class="logo">글로벌골프 <span>프로모션</span></div>
      <div class="count-badge" id="countBadge">불러오는 중...</div>
    </div>
    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" class="search-input" id="searchInput" placeholder="골프장 검색 (한글/영어)" oninput="render()">
    </div>
    <div class="country-tabs">
      <button class="country-tab active" onclick="setCountry('전체')">전체</button>
      <button class="country-tab" onclick="setCountry('태국')">TH 태국</button>
      <button class="country-tab" onclick="setCountry('인도네시아')">ID 인도네시아</button>
    </div>
    <div class="filter-scroll" id="filters"></div>
  </div>
  <div class="sort-bar">
    <span>진행 중인 프로모션</span>
    <select class="sort-select" id="sortSelect" onchange="render()">
      <option value="newest">최신 등록순</option>
      <option value="price_low">가격 낮은순</option>
      <option value="price_high">가격 높은순</option>
      <option value="ending">마감 임박순</option>
      <option value="nearby">가까운 순</option>
    </select>
  </div>
  <div id="content">
    <div class="skeleton-card"><div class="sk-line"></div><div class="sk-line"></div><div class="sk-line"></div><div class="sk-line"></div></div>
    <div class="skeleton-card"><div class="sk-line"></div><div class="sk-line"></div><div class="sk-line"></div><div class="sk-line"></div></div>
  </div>
</div>
<button class="refresh-btn" onclick="loadData()" title="새로고침">
  <svg viewBox="0 0 24 24"><path d="M17.65 6.35A7.958 7.958 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
</button>
<script>
var SUPABASE_URL="https://lkdhclaoxqgrlrjmsglm.supabase.co";
var SUPABASE_ANON_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxrZGhjbGFveHFncmxyam1zZ2xtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0NzE5MDMsImV4cCI6MjA5MTA0NzkwM30.rKsKu_LvYT1QP2QUilrvBT2AwU0TzwK9Aknk6eXEcoE";
var allData=[],activeCountry="전체",activeRegion="전체",expandedCards={},userLat=null,userLng=null;

function setCountry(c){activeCountry=c;activeRegion="전체";var t=document.querySelectorAll(".country-tab");for(var i=0;i<t.length;i++){t[i].classList.remove("active");if((c==="전체"&&i===0)||t[i].textContent.indexOf(c)!==-1)t[i].classList.add("active")}buildRegionFilters();render()}
function getUserLocation(){if(!navigator.geolocation)return;navigator.geolocation.getCurrentPosition(function(p){userLat=p.coords.latitude;userLng=p.coords.longitude},function(){},{enableHighAccuracy:false,timeout:5000})}
function calcDistance(a,b,c,d){if(!a||!b||!c||!d)return Infinity;var R=6371,dL=(c-a)*Math.PI/180,dN=(d-b)*Math.PI/180,x=Math.sin(dL/2)*Math.sin(dL/2)+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dN/2)*Math.sin(dN/2);return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x))}

async function loadData(){
  try{
    var r=await fetch(SUPABASE_URL+"/rest/v1/promotions?status=eq.active&order=created_at.desc",{headers:{"apikey":SUPABASE_ANON_KEY,"Authorization":"Bearer "+SUPABASE_ANON_KEY}});
    if(!r.ok)throw new Error("fail");
    allData=await r.json();
    var today=new Date().toISOString().split("T")[0];
    allData=allData.filter(function(d){if(!d.end_date)return true;return d.end_date>=today});
    buildRegionFilters();render();
  }catch(e){
    document.getElementById("content").innerHTML='<div class="empty"><div class="empty-icon">&#x26A0;&#xFE0F;</div><div class="empty-title">연결할 수 없습니다</div><div class="empty-desc">인터넷 연결을 확인해주세요.</div></div>';
    document.getElementById("countBadge").textContent="연결 오류";
  }
}

function getCountryData(){if(activeCountry==="전체")return allData;return allData.filter(function(d){return d.country===activeCountry})}
function buildRegionFilters(){var cd=getCountryData(),rs={};cd.forEach(function(d){if(d.region)rs[d.region]=true});var rg=["전체"].concat(Object.keys(rs).sort());var el=document.getElementById("filters");el.innerHTML="";activeRegion="전체";rg.forEach(function(r){var b=document.createElement("button");b.className="filter-btn"+(r==="전체"?" active":"");b.textContent=r;b.onclick=function(){activeRegion=r;el.querySelectorAll(".filter-btn").forEach(function(x){x.classList.remove("active")});b.classList.add("active");render()};el.appendChild(b)})}
function getMinPrice(d){var v=d.green_fee?Object.values(d.green_fee):[];if(!v.length)return Infinity;return Math.min.apply(null,v.map(Number))}
function getDaysLeft(d){if(!d.end_date)return Infinity;return Math.ceil((new Date(d.end_date)-new Date())/86400000)}

function getStatus(d){
  var today=new Date();today.setHours(0,0,0,0);var ts=today.toISOString().split("T")[0];
  if(d.start_date&&d.start_date>ts){var days=Math.ceil((new Date(d.start_date)-today)/86400000);return{label:days+"일 후 시작",css:"status-upcoming"}}
  var left=getDaysLeft(d);
  if(left<=0&&d.start_date===d.end_date)return{label:"당일 행사",css:"status-ending"};
  if(left<=3&&left>=0)return{label:left===0?"오늘 마감":left+"일 남음",css:"status-ending"};
  if(left<=7)return{label:left+"일 남음",css:"status-ending"};
  return{label:"진행중",css:"status-active"};
}

function isTournament(d){
  var c=(d.conditions||"").toLowerCase();
  return c.indexOf("[대회]")!==-1||c.indexOf("샷건")!==-1||c.indexOf("토너먼트")!==-1||c.indexOf("대회")!==-1||c.indexOf("상금")!==-1||c.indexOf("시상")!==-1||c.indexOf("마라톤")!==-1||c.indexOf("참가비")!==-1;
}

function groupByCourse(items){var m={},o=[];for(var i=0;i<items.length;i++){var k=items[i].golf_course;if(!m[k]){m[k]=[];o.push(k)}m[k].push(items[i])}return o.map(function(k){return{courseName:k,promos:m[k]}})}
function toggleExpand(id){expandedCards[id]=!expandedCards[id];var el=document.getElementById("hidden-"+id),btn=document.getElementById("btn-"+id);if(el&&btn){if(expandedCards[id]){el.classList.add("show");btn.classList.add("open");btn.innerHTML='접기<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m6 9 6 6 6-6"/></svg>'}else{el.classList.remove("show");btn.classList.remove("open");var n=el.querySelectorAll(".promo-item").length;btn.innerHTML='프로모션 '+n+'개 더 보기<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m6 9 6 6 6-6"/></svg>'}}}

function render(){
  var q=document.getElementById("searchInput").value.trim().toLowerCase();
  var items=getCountryData();
  if(activeRegion!=="전체")items=items.filter(function(d){return d.region===activeRegion});
  if(q)items=items.filter(function(d){return(d.golf_course||"").toLowerCase().indexOf(q)!==-1||(d.golf_course_en||"").toLowerCase().indexOf(q)!==-1});
  var sort=document.getElementById("sortSelect").value;
  if(sort==="price_low")items.sort(function(a,b){return getMinPrice(a)-getMinPrice(b)});
  else if(sort==="price_high")items.sort(function(a,b){return getMinPrice(b)-getMinPrice(a)});
  else if(sort==="ending")items.sort(function(a,b){return getDaysLeft(a)-getDaysLeft(b)});
  else if(sort==="nearby"){if(!userLat){getUserLocation();alert("위치 권한을 허용해주세요.");document.getElementById("sortSelect").value="newest";return}items.sort(function(a,b){return calcDistance(userLat,userLng,a.latitude,a.longitude)-calcDistance(userLat,userLng,b.latitude,b.longitude)})}
  var groups=groupByCourse(items);
  document.getElementById("countBadge").textContent=groups.length+"개 골프장 · "+items.length+"개 프로모션";
  if(!groups.length){document.getElementById("content").innerHTML='<div class="empty"><div class="empty-icon">&#x1F3CC;&#xFE0F;</div><div class="empty-title">프로모션이 없습니다</div><div class="empty-desc">'+(q?'"'+escHtml(q)+'" 검색 결과가 없습니다.':"등록된 프로모션이 없어요.")+'</div></div>';return}
  document.getElementById("content").innerHTML=groups.map(function(g,i){return renderGroup(g,i,q)}).join("");
}

function renderGroup(g,gi,q){
  var f=g.promos[0];var cc=f.country==="인도네시아"?"ID":"TH";
  var name=q?highlightMatch(f.golf_course,q):escHtml(f.golf_course);
  var nameEn=q?highlightMatch(f.golf_course_en||"",q):escHtml(f.golf_course_en||"");
  var right=g.promos.length>1?'<span class="promo-count-label">'+g.promos.length+'개 프로모션</span>':"";
  var h='<div class="card"><div class="card-main"><div class="card-header"><div class="card-header-left"><div class="course-name"><span class="cc">'+cc+'</span>'+name+'</div><div class="course-sub">'+nameEn+(nameEn&&f.region?" &middot; ":"")+escHtml(f.region||"")+'</div></div><div class="card-header-right">'+right+'</div></div></div><div class="promo-list">';
  h+=renderPromo(g.promos[0]);
  if(g.promos.length>1){var cid="g"+gi;var isO=expandedCards[cid];h+='<div id="hidden-'+cid+'" class="promo-hidden'+(isO?" show":"")+'">';for(var i=1;i<g.promos.length;i++)h+=renderPromo(g.promos[i]);h+='</div>';h+='<button id="btn-'+cid+'" class="expand-btn'+(isO?" open":"")+'" onclick="toggleExpand(\''+cid+'\')">'+(isO?"접기":"프로모션 "+(g.promos.length-1)+"개 더 보기")+'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m6 9 6 6 6-6"/></svg></button>'}
  h+='</div></div>';return h;
}

function renderPromo(d){
  var status=getStatus(d);
  var isTour=isTournament(d);
  var typeClass=d.price_type==="all_inclusive"?"type-all":d.price_type==="package"?"type-pkg":"type-green";
  var typeText=d.price_type==="all_inclusive"?"올인클루시브":d.price_type==="package"?"패키지":"그린피만";
  var curr=d.currency==="KRW"?"원":d.currency==="IDR"?"루피아":"바트";

  // 스마트 가격 표시
  var priceResult=buildSmartPrice(d.green_fee,curr);

  // 태그
  var tags=[];
  if(d.includes_caddy)tags.push('<span class="tag tag-included">캐디 포함</span>');
  if(d.includes_cart)tags.push('<span class="tag tag-included">카트 포함</span>');
  if(d.includes_hotel)tags.push('<span class="tag tag-included">숙박 포함</span>');
  if(d.includes_meal)tags.push('<span class="tag tag-included">식사 포함</span>');
  if(d.caddy_fee)tags.push('<span class="tag tag-extra">캐디 '+d.caddy_fee+'바트 별도</span>');
  if(d.cart_fee)tags.push('<span class="tag tag-extra">카트 '+d.cart_fee+'바트 별도</span>');

  // 날짜 표시: 하루짜리, 기간, 상시 구분
  var dateStr=buildDateStr(d);

  var distText="";
  if(userLat&&d.latitude){var km=calcDistance(userLat,userLng,d.latitude,d.longitude);if(km<10000)distText=" · "+Math.round(km)+"km"}
  var contactHTML="";
  if(d.contact_kakao)contactHTML='<span class="contact-link">카톡 '+escHtml(d.contact_kakao)+'</span>';
  else if(d.contact_phone)contactHTML='<a href="tel:'+d.contact_phone.replace(/[^0-9+]/g,"")+'" class="contact-link">'+escHtml(d.contact_phone)+'</a>';

  // conditions에서 [대회] 태그 제거 후 표시
  var condText=(d.conditions||"").replace("[대회]","").replace("[대회] ","").trim();

  var h='<div class="promo-item">';
  h+='<div class="promo-status-row">';
  h+='<span class="status-badge '+status.css+'">'+status.label+'</span>';
  h+='<span class="promo-type-badge '+typeClass+'">'+typeText+'</span>';
  if(isTour)h+='<span class="promo-type-badge type-tournament">대회</span>';
  h+='</div>';
  h+='<div class="price-row">'+priceResult.html+'</div>';
  if(priceResult.note)h+='<div class="price-note">'+priceResult.note+'</div>';
  if(tags.length)h+='<div class="tags">'+tags.join("")+'</div>';
  if(condText)h+='<div class="cond-text">'+escHtml(condText)+'</div>';
  h+='<div class="promo-footer"><span class="date-text">'+dateStr+distText+'</span>'+contactHTML+'</div>';
  h+='</div>';
  return h;
}

// 날짜 표시 로직
function buildDateStr(d){
  var s=d.start_date;var e=d.end_date;
  if(!s&&!e)return"상시";
  if(s&&e&&s===e)return formatDate(s)+" (당일)";
  if(s&&!e)return formatDate(s)+" ~ 상시";
  if(!s&&e)return"~ "+formatDate(e);
  return formatDate(s)+" ~ "+formatDate(e);
}

// 스마트 가격 표시
function buildSmartPrice(greenFee,curr){
  if(!greenFee)return{html:'<span class="price-unit">가격 문의</span>',note:""};
  var entries=Object.entries(greenFee);
  if(!entries.length)return{html:'<span class="price-unit">가격 문의</span>',note:""};

  var keys=Object.keys(greenFee);
  var note="";

  // 주중 오전/오후 비교
  var wdM=greenFee["weekday_morning"];
  var wdA=greenFee["weekday_afternoon"];
  var weM=greenFee["weekend_morning"];
  var weA=greenFee["weekend_afternoon"];

  // 주중 오전/오후가 동일하면 통합
  if(wdM!==undefined&&wdA!==undefined&&wdM===wdA){
    greenFee["weekday"]=wdM;
    delete greenFee["weekday_morning"];
    delete greenFee["weekday_afternoon"];
    note="주중 오전/오후 동일";
  }
  // 주말 오전/오후가 동일하면 통합
  if(weM!==undefined&&weA!==undefined&&weM===weA){
    greenFee["weekend"]=weM;
    delete greenFee["weekend_morning"];
    delete greenFee["weekend_afternoon"];
    note=note?(note+", 주말 오전/오후 동일"):"주말 오전/오후 동일";
  }

  entries=Object.entries(greenFee);

  var lm={
    "default":"","weekday":"주중","weekend":"주말",
    "weekday_morning":"주중오전","weekday_afternoon":"주중오후",
    "weekend_morning":"주말오전","weekend_afternoon":"주말오후",
    "morning":"오전","afternoon":"오후",
    "golfer":"골퍼","non_golfer":"논골퍼",
    "wednesday":"수요일","holiday":"공휴일"
  };

  var html=entries.map(function(e,i){
    var label=lm[e[0]]||e[0];
    var sep=i>0?' <span class="price-sep">/</span> ':"";
    var fs=entries.length>2?17:entries.length>1?20:22;
    return sep+'<span class="price-main" style="font-size:'+fs+'px">'+Number(e[1]).toLocaleString()+'</span><span class="price-unit"> '+curr+(label?"("+label+")":"")+'</span>';
  }).join("");

  return{html:html,note:note};
}

function highlightMatch(t,q){if(!t||!q)return escHtml(t);var i=t.toLowerCase().indexOf(q.toLowerCase());if(i===-1)return escHtml(t);return escHtml(t.substring(0,i))+'<mark>'+escHtml(t.substring(i,i+q.length))+'</mark>'+escHtml(t.substring(i+q.length))}
function formatDate(s){var d=new Date(s+"T00:00:00");return(d.getMonth()+1)+"/"+d.getDate()}
function escHtml(s){if(!s)return"";return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
