<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>타이골프프로모션</title>
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  :root{
    --bg:#F6F5F0;--card:#FFFFFF;--text:#1A1A1A;--text2:#6B6B6B;--text3:#9B9B9B;
    --border:#E8E6E1;--green:#1D9E75;--green-bg:#E1F5EE;--amber:#BA7517;--amber-bg:#FFF8ED;
    --purple:#6A4FC7;--purple-bg:#F0EDFF;--red:#D64545;--red-bg:#FFF0F0;--accent:#1B5E20;
    --blue:#2563EB;--blue-bg:#EFF6FF;
  }
  body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
  .app{max-width:480px;margin:0 auto;padding:0 16px 80px}

  .header{position:sticky;top:0;z-index:100;background:var(--bg);padding:16px 0 0}
  .header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
  .logo{font-size:18px;font-weight:700;color:var(--accent);letter-spacing:-0.5px}
  .logo span{font-weight:400;color:var(--text2)}
  .count-badge{font-size:12px;color:var(--text2);background:var(--card);border:1px solid var(--border);padding:4px 10px;border-radius:20px}

  /* 검색 */
  .search-wrap{position:relative;margin-bottom:10px}
  .search-input{width:100%;font-family:inherit;font-size:14px;padding:10px 14px 10px 38px;border:1px solid var(--border);border-radius:12px;background:var(--card);color:var(--text);outline:none;transition:border-color 0.15s}
  .search-input:focus{border-color:var(--accent)}
  .search-input::placeholder{color:var(--text3)}
  .search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:18px;height:18px;color:var(--text3)}

  /* 국가 탭 */
  .country-tabs{display:flex;gap:8px;margin-bottom:10px}
  .country-tab{flex:1;font-family:inherit;font-size:14px;font-weight:600;padding:10px;border-radius:12px;border:1px solid var(--border);background:var(--card);color:var(--text2);cursor:pointer;text-align:center;transition:all 0.15s}
  .country-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  .country-tab .flag{margin-right:4px}

  /* 지역 필터 */
  .filter-scroll{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none;padding-bottom:10px}
  .filter-scroll::-webkit-scrollbar{display:none}
  .filter-btn{flex-shrink:0;font-family:inherit;font-size:13px;font-weight:500;padding:7px 14px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--text2);cursor:pointer;transition:all 0.15s;white-space:nowrap}
  .filter-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}

  .sort-bar{display:flex;justify-content:space-between;align-items:center;margin:0 0 10px}
  .sort-bar span{font-size:12px;color:var(--text3)}
  .sort-select{font-family:inherit;font-size:12px;color:var(--text2);background:transparent;border:none;cursor:pointer}

  .card{background:var(--card);border-radius:14px;padding:16px;margin-bottom:10px;border:1px solid var(--border);transition:transform 0.1s}
  .card:active{transform:scale(0.985)}
  .card-header{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:10px}
  .card-header-left{flex:1;min-width:0}
  .course-name{font-size:16px;font-weight:700;color:var(--text);letter-spacing:-0.3px;line-height:1.3}
  .course-sub{font-size:12px;color:var(--text3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .badges{display:flex;gap:4px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end}
  .badge{font-size:11px;font-weight:600;padding:4px 10px;border-radius:8px;white-space:nowrap}
  .type-all{background:var(--green-bg);color:var(--green)}
  .type-green{background:var(--amber-bg);color:var(--amber)}
  .type-pkg{background:var(--purple-bg);color:var(--purple)}
  .status-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px}
  .status-upcoming{background:var(--blue-bg);color:var(--blue)}
  .status-active{background:var(--green-bg);color:var(--green)}
  .status-ending{background:var(--red-bg);color:var(--red);animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.6}}

  .price-row{display:flex;align-items:baseline;gap:6px;margin-bottom:10px;flex-wrap:wrap}
  .price-main{font-size:22px;font-weight:800;color:var(--text);letter-spacing:-0.5px}
  .price-unit{font-size:13px;font-weight:500;color:var(--text2)}
  .price-sep{font-size:13px;color:var(--text3)}
  .tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
  .tag{font-size:11px;font-weight:500;padding:3px 8px;border-radius:6px;background:#F2F1EC;color:var(--text2)}
  .tag-included{background:var(--green-bg);color:var(--green)}
  .tag-extra{background:var(--red-bg);color:var(--red)}
  .cond-text{font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:8px;padding:8px 10px;background:#FAFAF7;border-radius:8px}
  .card-footer{display:flex;justify-content:space-between;align-items:center;padding-top:8px;border-top:1px solid var(--border)}
  .date-text{font-size:12px;color:var(--text3)}
  .contact-link{font-size:12px;font-weight:600;color:var(--accent);text-decoration:none}

  .empty{text-align:center;padding:60px 20px;color:var(--text3)}
  .empty-icon{font-size:40px;margin-bottom:12px}
  .empty-title{font-size:16px;font-weight:600;color:var(--text2);margin-bottom:6px}
  .empty-desc{font-size:13px;line-height:1.6}

  .skeleton-card{background:var(--card);border-radius:14px;padding:16px;margin-bottom:10px;border:1px solid var(--border)}
  .sk-line{height:14px;background:linear-gradient(90deg,#f0efe9 25%,#e8e7e1 50%,#f0efe9 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:6px;margin-bottom:10px}
  .sk-line:nth-child(1){width:55%;height:18px}.sk-line:nth-child(2){width:35%}.sk-line:nth-child(3){width:40%;height:24px}.sk-line:last-child{width:80%;margin-bottom:0}
  @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}

  .refresh-btn{position:fixed;bottom:20px;right:20px;width:48px;height:48px;border-radius:50%;background:var(--accent);color:#fff;border:none;font-size:20px;cursor:pointer;box-shadow:0 4px 12px rgba(27,94,32,0.3);display:flex;align-items:center;justify-content:center;transition:transform 0.15s;z-index:100}
  .refresh-btn:active{transform:scale(0.9)}
  .refresh-btn svg{width:22px;height:22px;fill:#fff}
  mark{background:#FEF08A;color:var(--text);border-radius:2px;padding:0 1px}
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <div class="header-top">
      <div class="logo">타이인니골프 <span>프로모션</span></div>
      <div class="count-badge" id="countBadge">불러오는 중...</div>
    </div>

    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" class="search-input" id="searchInput" placeholder="골프장 검색 (한글/영어)" oninput="render()">
    </div>

    <!-- 국가 탭 -->
    <div class="country-tabs" id="countryTabs">
      <button class="country-tab active" onclick="setCountry('전체')"><span class="flag">&#x1F30F;</span>전체</button>
      <button class="country-tab" onclick="setCountry('태국')"><span class="flag">&#x1F1F9;&#x1F1ED;</span>태국</button>
      <button class="country-tab" onclick="setCountry('인도네시아')"><span class="flag">&#x1F1EE;&#x1F1E9;</span>인도네시아</button>
    </div>

    <!-- 지역 필터 -->
    <div class="filter-scroll" id="filters"></div>
  </div>

  <div class="sort-bar">
    <span id="statusText">진행 중인 프로모션</span>
    <select class="sort-select" id="sortSelect" onchange="render()">
      <option value="newest">최신 등록순</option>
      <option value="price_low">가격 낮은순</option>
      <option value="price_high">가격 높은순</option>
      <option value="ending">마감 임박순</option>
    </select>
  </div>

  <div id="content">
    <div class="skeleton-card"><div class="sk-line"></div><div class="sk-line"></div><div class="sk-line"></div><div class="sk-line"></div></div>
    <div class="skeleton-card"><div class="sk-line"></div><div class="sk-line"></div><div class="sk-line"></div><div class="sk-line"></div></div>
    <div class="skeleton-card"><div class="sk-line"></div><div class="sk-line"></div><div class="sk-line"></div><div class="sk-line"></div></div>
  </div>
</div>

<button class="refresh-btn" onclick="loadData()" title="새로고침">
  <svg viewBox="0 0 24 24"><path d="M17.65 6.35A7.958 7.958 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
</button>

<script>
// ============================================================
var SUPABASE_URL = "https://lkdhclaoxqgrlrjmsglm.supabase.co";
var SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxrZGhjbGFveHFncmxyam1zZ2xtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0NzE5MDMsImV4cCI6MjA5MTA0NzkwM30.rKsKu_LvYT1QP2QUilrvBT2AwU0TzwK9Aknk6eXEcoE";
// ============================================================

var allData = [];
var activeCountry = "전체";
var activeRegion = "전체";

function setCountry(c) {
  activeCountry = c;
  activeRegion = "전체";
  document.querySelectorAll(".country-tab").forEach(function(btn) {
    btn.classList.remove("active");
  });
  // 해당 버튼 활성화
  var tabs = document.querySelectorAll(".country-tab");
  for (var i = 0; i < tabs.length; i++) {
    if (tabs[i].textContent.indexOf(c === "전체" ? "전체" : c) !== -1) {
      tabs[i].classList.add("active");
      break;
    }
  }
  buildRegionFilters();
  render();
}

async function loadData() {
  try {
    var res = await fetch(
      SUPABASE_URL + "/rest/v1/promotions?status=eq.active&order=created_at.desc",
      { headers: { "apikey": SUPABASE_ANON_KEY, "Authorization": "Bearer " + SUPABASE_ANON_KEY } }
    );
    if (!res.ok) throw new Error("DB 연결 실패");
    allData = await res.json();

    // 종료된 프로모션 제외
    var today = new Date().toISOString().split("T")[0];
    allData = allData.filter(function(d) {
      if (!d.end_date) return true;
      return d.end_date >= today;
    });

    buildRegionFilters();
    render();
  } catch (err) {
    console.error(err);
    document.getElementById("content").innerHTML =
      '<div class="empty"><div class="empty-icon">&#x26A0;&#xFE0F;</div>' +
      '<div class="empty-title">연결할 수 없습니다</div>' +
      '<div class="empty-desc">인터넷 연결을 확인해주세요.</div></div>';
    document.getElementById("countBadge").textContent = "연결 오류";
  }
}

function getCountryData() {
  if (activeCountry === "전체") return allData;
  return allData.filter(function(d) { return d.country === activeCountry; });
}

function buildRegionFilters() {
  var countryData = getCountryData();
  var regionSet = {};
  countryData.forEach(function(d) { if (d.region) regionSet[d.region] = true; });
  var regions = ["전체"].concat(Object.keys(regionSet).sort());

  var el = document.getElementById("filters");
  el.innerHTML = "";
  activeRegion = "전체";

  regions.forEach(function(r) {
    var b = document.createElement("button");
    b.className = "filter-btn" + (r === "전체" ? " active" : "");
    b.textContent = r;
    b.onclick = function() {
      activeRegion = r;
      el.querySelectorAll(".filter-btn").forEach(function(x) { x.classList.remove("active"); });
      b.classList.add("active");
      render();
    };
    el.appendChild(b);
  });
}

function getMinPrice(d) {
  var vals = d.green_fee ? Object.values(d.green_fee) : [];
  if (vals.length === 0) return Infinity;
  return Math.min.apply(null, vals.map(Number));
}

function getDaysLeft(d) {
  if (!d.end_date) return Infinity;
  return Math.ceil((new Date(d.end_date) - new Date()) / 86400000);
}

function getStatus(d) {
  var today = new Date();
  today.setHours(0, 0, 0, 0);
  var todayStr = today.toISOString().split("T")[0];

  if (d.start_date && d.start_date > todayStr) {
    var daysToStart = Math.ceil((new Date(d.start_date) - today) / 86400000);
    return { label: daysToStart + "일 후 시작", css: "status-upcoming" };
  }
  var daysLeft = getDaysLeft(d);
  if (daysLeft <= 3 && daysLeft >= 0) {
    return { label: daysLeft === 0 ? "오늘 마감" : daysLeft + "일 남음", css: "status-ending" };
  }
  if (daysLeft <= 7 && daysLeft > 3) {
    return { label: daysLeft + "일 남음", css: "status-ending" };
  }
  return { label: "진행 중", css: "status-active" };
}

function render() {
  var searchQuery = document.getElementById("searchInput").value.trim().toLowerCase();
  var items = getCountryData();

  if (activeRegion !== "전체") {
    items = items.filter(function(d) { return d.region === activeRegion; });
  }

  if (searchQuery) {
    items = items.filter(function(d) {
      var name = (d.golf_course || "").toLowerCase();
      var nameEn = (d.golf_course_en || "").toLowerCase();
      return name.indexOf(searchQuery) !== -1 || nameEn.indexOf(searchQuery) !== -1;
    });
  }

  var sort = document.getElementById("sortSelect").value;
  if (sort === "price_low") items.sort(function(a, b) { return getMinPrice(a) - getMinPrice(b); });
  else if (sort === "price_high") items.sort(function(a, b) { return getMinPrice(b) - getMinPrice(a); });
  else if (sort === "ending") items.sort(function(a, b) { return getDaysLeft(a) - getDaysLeft(b); });

  document.getElementById("countBadge").textContent = items.length + "개 프로모션";

  if (items.length === 0) {
    var emptyMsg = searchQuery
      ? '"' + escHtml(searchQuery) + '" 검색 결과가 없습니다.'
      : "등록된 프로모션이 없어요.";
    document.getElementById("content").innerHTML =
      '<div class="empty"><div class="empty-icon">&#x1F3CC;&#xFE0F;</div>' +
      '<div class="empty-title">프로모션이 없습니다</div>' +
      '<div class="empty-desc">' + emptyMsg + '</div></div>';
    return;
  }

  document.getElementById("content").innerHTML = items.map(function(d) {
    return renderCard(d, searchQuery);
  }).join("");
}

function renderCard(d, searchQuery) {
  var status = getStatus(d);
  var badgeClass = d.price_type === "all_inclusive" ? "type-all" : d.price_type === "package" ? "type-pkg" : "type-green";
  var badgeText = d.price_type === "all_inclusive" ? "올인클루시브" : d.price_type === "package" ? "패키지" : "그린피만";

  var curr = d.currency === "KRW" ? "원" : d.currency === "IDR" ? "루피아" : "바트";
  var labelMap = {default:"",weekday:"주중",weekend:"주말",morning:"오전",afternoon:"오후",golfer:"골퍼",non_golfer:"논골퍼",wednesday:"수요일",weekend_afternoon:"주말오후"};
  var entries = d.green_fee ? Object.entries(d.green_fee) : [];

  var priceHTML = "";
  if (entries.length === 0) {
    priceHTML = '<span class="price-unit">가격 문의</span>';
  } else if (entries.length === 1) {
    priceHTML = '<span class="price-main">' + Number(entries[0][1]).toLocaleString() + '</span>' +
      '<span class="price-unit"> ' + curr + (labelMap[entries[0][0]] ? "(" + labelMap[entries[0][0]] + ")" : "") + '</span>';
  } else {
    priceHTML = entries.map(function(e, i) {
      var label = labelMap[e[0]] || e[0];
      var sep = i > 0 ? ' <span class="price-sep">/</span> ' : "";
      var fontSize = entries.length > 2 ? "17" : "20";
      return sep + '<span class="price-main" style="font-size:' + fontSize + 'px">' +
        Number(e[1]).toLocaleString() + '</span>' +
        '<span class="price-unit"> ' + curr + "(" + label + ")</span>";
    }).join("");
  }

  var tags = [];
  if (d.includes_caddy) tags.push('<span class="tag tag-included">캐디 포함</span>');
  if (d.includes_cart) tags.push('<span class="tag tag-included">카트 포함</span>');
  if (d.includes_hotel) tags.push('<span class="tag tag-included">숙박 포함</span>');
  if (d.includes_meal) tags.push('<span class="tag tag-included">식사 포함</span>');
  if (d.caddy_fee) tags.push('<span class="tag tag-extra">캐디 ' + d.caddy_fee + '바트 별도</span>');
  if (d.cart_fee) tags.push('<span class="tag tag-extra">카트 ' + d.cart_fee + '바트 별도</span>');

  var startStr = d.start_date ? formatDate(d.start_date) : "미정";
  var endStr = d.end_date ? formatDate(d.end_date) : "상시";

  var contactHTML = "";
  if (d.contact_kakao) {
    contactHTML = '<span class="contact-link">카톡 ' + escHtml(d.contact_kakao) + '</span>';
  } else if (d.contact_phone) {
    contactHTML = '<a href="tel:' + d.contact_phone.replace(/[^0-9+]/g, "") + '" class="contact-link">' + escHtml(d.contact_phone) + '</a>';
  }

  var displayName = searchQuery ? highlightMatch(d.golf_course, searchQuery) : escHtml(d.golf_course);
  var displayNameEn = searchQuery ? highlightMatch(d.golf_course_en || "", searchQuery) : escHtml(d.golf_course_en || "");

  var countryFlag = d.country === "인도네시아" ? "&#x1F1EE;&#x1F1E9; " : d.country === "태국" ? "&#x1F1F9;&#x1F1ED; " : "";

  return '<div class="card">' +
    '<div class="card-header">' +
      '<div class="card-header-left">' +
        '<div class="course-name">' + countryFlag + displayName + '</div>' +
        '<div class="course-sub">' + displayNameEn + (displayNameEn && d.region ? " &middot; " : "") + escHtml(d.region || "") + '</div>' +
      '</div>' +
      '<div class="badges">' +
        '<span class="status-badge ' + status.css + '">' + status.label + '</span>' +
        '<span class="badge ' + badgeClass + '">' + badgeText + '</span>' +
      '</div>' +
    '</div>' +
    '<div class="price-row">' + priceHTML + '</div>' +
    (tags.length ? '<div class="tags">' + tags.join("") + '</div>' : "") +
    (d.conditions ? '<div class="cond-text">' + escHtml(d.conditions) + '</div>' : "") +
    '<div class="card-footer">' +
      '<span class="date-text">' + startStr + ' ~ ' + endStr + '</span>' +
      contactHTML +
    '</div>' +
  '</div>';
}

function highlightMatch(text, query) {
  if (!text || !query) return escHtml(text);
  var lower = text.toLowerCase();
  var idx = lower.indexOf(query.toLowerCase());
  if (idx === -1) return escHtml(text);
  return escHtml(text.substring(0, idx)) + '<mark>' + escHtml(text.substring(idx, idx + query.length)) + '</mark>' + escHtml(text.substring(idx + query.length));
}

function formatDate(s) {
  var d = new Date(s + "T00:00:00");
  return (d.getMonth() + 1) + "/" + d.getDate();
}

function escHtml(s) {
  if (!s) return "";
  return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

loadData();
</script>
</body>
</html>
